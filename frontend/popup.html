<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Delhi Police Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Container for Language Choice (Screen 1) -->
  <div id="screen-lang" class="screen active">
    <div class="logo-container">
      <img class="dp-emblem" src="icon.png" alt="Delhi Police Logo">
      <h1>Delhi Police</h1>
      <p class="motto">शान्ति • सेवा • न्याय</p>
    </div>
    
    <div class="lang-prompt">
      <p>Select Language / भाषा चुनें</p>
      <div class="lang-buttons">
        <button id="btn-lang-en" class="btn btn-primary">English</button>
        <button id="btn-lang-hi" class="btn btn-primary">हिन्दी</button>
      </div>
    </div>
  </div>

  <!-- Container for Main Assistant (Screen 2) -->
  <div id="screen-main" class="screen">
    <!-- Header with logo and language quick toggle -->
    <header class="main-header">
      <div class="header-logo-group">
        <img class="header-logo" src="icon.png" alt="Delhi Police Logo">
        <div class="header-title-group">
          <h2>Delhi Police Assistant</h2>
          <p class="header-motto">शान्ति • सेवा • न्याय</p>
        </div>
      </div>
      <button id="btn-toggle-lang" class="btn-text-toggle">हिन्दी</button>
    </header>

    <!-- Content Area -->
    <div class="main-content">
      <!-- Quick Services section -->
      <section class="quick-services-section">
        <h3 id="quick-services-title">Quick Services</h3>
        <div class="quick-buttons-grid">
          <button id="btn-quick-lost" class="btn-quick" data-query="lost report">Lost Report</button>
          <button id="btn-quick-mv" class="btn-quick" data-query="motor vehicle theft">MV Theft e-FIR</button>
          <button id="btn-quick-theft" class="btn-quick" data-query="theft report">Theft e-FIR</button>
          <button id="btn-quick-pcc" class="btn-quick" data-query="police clearance">PCC</button>
          <button id="btn-quick-cvr" class="btn-quick" data-query="character verification">CVR</button>
        </div>
      </section>

      <!-- Input Area -->
      <section class="input-section">
        <div class="search-box">
          <input type="text" id="input-query" placeholder="Describe your issue (e.g. I lost my phone)..." autocomplete="off">
          <button id="btn-search" class="btn-search">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Response Area -->
      <section id="response-container" class="response-section hidden">
        <div class="response-header">
          <span id="response-badge" class="response-badge">Assistant Response</span>
        </div>
        <p id="response-answer" class="response-text"></p>
        <div id="services-list" class="services-list"></div>
      </section>
      
      <!-- Welcome / Guidance Text (Visible when no query has been run) -->
      <section id="welcome-instruction" class="welcome-instruction">
        <p id="welcome-text">Select a quick service above or type your query below to get instant guidance and service links.</p>
      </section>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
